<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录/注册 - 硬件探索者</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="src/css/style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<canvas id="particles"></canvas>

<aside class="sidebar fixed left-0 top-0 bottom-0 glass-strong z-40 p-4 hidden md:flex flex-col">
  <button class="sidebar-toggle" aria-label="切换侧边栏">
    <i class="fas fa-chevron-left"></i>
  </button>
  
  <div class="sidebar-header">
    <div class="sidebar-logo animate-glow">
      <i class="fas fa-microchip text-white"></i>
    </div>
    <div class="sidebar-header-text">
      <div class="font-display font-bold text-sm tracking-wider">HARDWARE</div>
      <div class="text-[10px] text-[var(--accent-cyan)]">EXPLORER</div>
    </div>
  </div>
  
  <nav class="flex-1 overflow-y-auto">
    <div class="nav-section">
      <div class="nav-section-title">主导航</div>
      <div class="nav-item" data-page="index" onclick="navigateTo('index')">
        <i class="fas fa-home"></i>
        <span class="nav-text">首页</span>
      </div>
      <div class="nav-item" data-page="learning-path" onclick="navigateTo('learning-path')">
        <i class="fas fa-route"></i>
        <span class="nav-text">学习路径</span>
      </div>
      <div class="nav-item" data-page="beginner-guide" onclick="navigateTo('beginner-guide')">
        <i class="fas fa-graduation-cap"></i>
        <span class="nav-text">新手入门</span>
      </div>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-title">知识库</div>
      <div class="nav-item" data-page="encyclopedia" onclick="navigateTo('encyclopedia')">
        <i class="fas fa-book"></i>
        <span class="nav-text">硬件百科</span>
      </div>
      <div class="nav-item" data-page="mobile-hardware" onclick="navigateTo('mobile-hardware')">
        <i class="fas fa-mobile-alt"></i>
        <span class="nav-text">手机硬件</span>
      </div>
      <div class="nav-item" data-page="other-devices" onclick="navigateTo('other-devices')">
        <i class="fas fa-laptop"></i>
        <span class="nav-text">其他设备</span>
      </div>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-title">互动工具</div>
      <div class="nav-item" data-page="builder" onclick="navigateTo('builder')">
        <i class="fas fa-tools"></i>
        <span class="nav-text">装机模拟</span>
        <span class="nav-badge">NEW</span>
      </div>
      <div class="nav-item" data-page="quiz" onclick="navigateTo('quiz')">
        <i class="fas fa-question-circle"></i>
        <span class="nav-text">知识测验</span>
      </div>
      <div class="nav-item" data-page="achievements" onclick="navigateTo('achievements')">
        <i class="fas fa-trophy"></i>
        <span class="nav-text">成就系统</span>
      </div>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-title">账户</div>
      <div class="nav-item active" data-page="login" onclick="navigateTo('login')">
        <i class="fas fa-user-circle"></i>
        <span class="nav-text">登录/注册</span>
      </div>
    </div>
  </nav>
  
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title"><i class="fas fa-chart-line mr-1"></i> 学习进度</span>
      <span class="progress-value" id="progressText">0%</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar" style="width: 0%"></div>
    </div>
    <div class="progress-stats">
      <span><i class="fas fa-book-open"></i> 0/200 知识点</span>
      <span><i class="fas fa-star"></i> 0 成就</span>
    </div>
  </div>
</aside>

<nav class="mobile-nav">
  <div data-mobile="index" onclick="navigateTo('index')">
    <i class="fas fa-home"></i>
    <span>首页</span>
  </div>
  <div data-mobile="learning-path" onclick="navigateTo('learning-path')">
    <i class="fas fa-route"></i>
    <span>学习</span>
  </div>
  <div data-mobile="builder" onclick="navigateTo('builder')">
    <i class="fas fa-tools"></i>
    <span>装机</span>
  </div>
  <div data-mobile="quiz" onclick="navigateTo('quiz')">
    <i class="fas fa-gamepad"></i>
    <span>测验</span>
  </div>
  <div class="mobile-nav-more">
    <i class="fas fa-ellipsis-h"></i>
    <span>更多</span>
    <div class="mobile-nav-more-popup">
      <div class="mobile-nav-more-popup-item" data-page="beginner-guide">
        <i class="fas fa-graduation-cap"></i>
        <span>新手入门</span>
      </div>
      <div class="mobile-nav-more-popup-item" data-page="encyclopedia">
        <i class="fas fa-book"></i>
        <span>硬件百科</span>
      </div>
      <div class="mobile-nav-more-popup-item" data-page="mobile-hardware">
        <i class="fas fa-mobile-alt"></i>
        <span>手机硬件</span>
      </div>
      <div class="mobile-nav-more-popup-item" data-page="other-devices">
        <i class="fas fa-laptop"></i>
        <span>其他设备</span>
      </div>
      <div class="mobile-nav-more-popup-item" data-page="achievements">
        <i class="fas fa-trophy"></i>
        <span>成就系统</span>
      </div>
      <div class="mobile-nav-more-popup-item active" data-page="login">
        <i class="fas fa-user-circle"></i>
        <span>登录/注册</span>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="page">
    <div class="login-container">
      <div class="login-form glass-strong">
        <div class="text-center mb-8">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[var(--accent-cyan)] to-[var(--accent-orange)] flex items-center justify-center animate-glow mx-auto mb-4">
            <i class="fas fa-microchip text-3xl text-white"></i>
          </div>
          <h2 class="font-display text-2xl font-bold mb-2">硬件探索者</h2>
          <p class="text-[var(--text-secondary)]">登录以访问完整功能</p>
        </div>
        
        <form id="login-form">
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2">用户名/邮箱</label>
            <input type="text" id="username" class="login-input" placeholder="请输入用户名或邮箱" required>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2">密码</label>
            <input type="password" id="password" class="login-input" placeholder="请输入密码" required>
          </div>
          <div class="login-checkbox">
            <input type="checkbox" id="remember">
            <label for="remember" class="text-sm">记住我</label>
          </div>
          <div class="login-links">
            <a href="#">忘记密码？</a>
            <a href="#">注册账号</a>
          </div>
          <button type="submit" class="btn-primary w-full">登录</button>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="src/js/script.js"></script>
</body>
</html>
